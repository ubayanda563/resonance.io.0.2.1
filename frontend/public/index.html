<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ── Viewport: cover full screen, prevent zoom on inputs ── -->
    <meta name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />

    <!-- ── PWA / App appearance ── -->
    <meta name="theme-color" content="#030306" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Resonance" />

    <!-- ── Description & OG ── -->
    <meta name="description" content="Resonance — Your music, your mood. A premium music player for web and mobile." />
    <meta property="og:title"       content="Resonance Music Player" />
    <meta property="og:description" content="Stream your library, discover trending music, and manage playlists." />
    <meta property="og:type"        content="website" />

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- ── Prevent FOUC flash ── -->
    <style>
      html, body, #root {
        background: #030306;
        margin: 0; padding: 0;
        height: 100%;
        overflow: hidden;
      }
      /* Hide until React hydrates */
      #root:empty::before {
        content: '';
        display: block;
        width: 32px;
        height: 32px;
        margin: 48vh auto 0;
        border: 2px solid rgba(196,154,40,0.2);
        border-top-color: #C49A28;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <title>Resonance | Music Player</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
